# Voice-pipeline eval suite: audio in -> STT -> agents -> ledger, + WER.
# Clips under audio/recorded/ are human recordings (preferred when present);
# audio/synthetic/ clips are generated by `make eval-audio-synth` and labeled
# synthetic in reports (same-vendor circularity noted when TTS==STT vendor).
# Gold transcripts use ASCII digits so WER measures recognition, not orthography.
suite: audio_core
cases:
  - id: a_udhaar_devanagari
    lang: hi
    tags: [khata, audio]
    turns:
      - utterance: "रमेश को 200 रुपये उधार लिख दो"
        audio: synthetic/a_udhaar_devanagari.wav
        gold_transcript: "रमेश को 200 रुपये उधार लिख दो"
        gold_intent: khata
        expected_tools: [add_udhaar]
        expected_ledger_delta:
          - {type: udhaar, amount_paise: 20000, customer: Ramesh}

  - id: a_udhaar_romanized
    tags: [khata, audio, codemix]
    turns:
      - utterance: "Suresh ko 300 rupaye udhaar likh do"
        audio: synthetic/a_udhaar_romanized.wav
        gold_transcript: "सुरेश को 300 रुपये उधार लिख दो"
        tts_text: "Suresh ko 300 rupaye udhaar likh do"
        gold_intent: khata
        expected_tools: [add_udhaar]
        expected_ledger_delta:
          - {type: udhaar, amount_paise: 30000, customer: Suresh}

  - id: a_repayment
    lang: hi
    tags: [khata, audio, given]
    given:
      transactions:
        - {type: udhaar, customer: Ramesh, amount_paise: 20000}
    turns:
      - utterance: "रमेश ने 50 रुपये वापस किये"
        audio: synthetic/a_repayment.wav
        gold_transcript: "रमेश ने 50 रुपये वापस किये"
        gold_intent: khata
        expected_tools: [record_repayment]
        expected_ledger_delta:
          - {type: repayment, amount_paise: 5000, customer: Ramesh}

  - id: a_sale_simple
    lang: hi
    tags: [billing, audio]
    turns:
      - utterance: "150 रुपये की बिक्री लिखो"
        audio: synthetic/a_sale_simple.wav
        gold_transcript: "150 रुपये की बिक्री लिखो"
        gold_intent: billing
        expected_tools: [add_sale]
        expected_ledger_delta:
          - {type: sale, amount_paise: 15000}

  - id: a_sale_english
    lang: en
    tags: [billing, audio, english]
    turns:
      - utterance: "Record a sale of 250 rupees"
        audio: synthetic/a_sale_english.wav
        gold_transcript: "Record a sale of 250 rupees"
        gold_intent: billing
        expected_tools: [add_sale]
        expected_ledger_delta:
          - {type: sale, amount_paise: 25000}

  - id: a_day_summary
    lang: hi
    tags: [insights, audio, given]
    given:
      transactions:
        - {type: sale, amount_paise: 15000}
    turns:
      - utterance: "आज का हिसाब बताओ"
        audio: synthetic/a_day_summary.wav
        gold_transcript: "आज का हिसाब बताओ"
        gold_intent: insights
        expected_tools: [day_summary]
        expected_ledger_delta: []

  - id: a_balance
    lang: hi
    tags: [khata, audio, given]
    given:
      transactions:
        - {type: udhaar, customer: Anita, amount_paise: 30000}
    turns:
      - utterance: "अनीता का बैलेंस बताओ"
        audio: synthetic/a_balance.wav
        gold_transcript: "अनीता का बैलेंस बताओ"
        gold_intents_any: [khata, insights]
        expected_tools: [get_balance]
        expected_ledger_delta: []

  - id: a_debtors
    lang: hi
    tags: [khata, audio, given]
    given:
      transactions:
        - {type: udhaar, customer: Ramesh, amount_paise: 20000}
        - {type: udhaar, customer: Suresh, amount_paise: 5000}
    turns:
      - utterance: "किस किस का उधार बाकी है"
        audio: synthetic/a_debtors.wav
        gold_transcript: "किस किस का उधार बाकी है"
        gold_intents_any: [khata, insights]
        expected_tools: [list_debtors]
        expected_ledger_delta: []

  - id: a_multi_intent
    lang: hi
    tags: [routing, audio, multi]
    turns:
      - utterance: "100 की सेल लिखो और मीना को 50 रुपये उधार"
        audio: synthetic/a_multi_intent.wav
        gold_transcript: "100 की सेल लिखो और मीना को 50 रुपये उधार"
        gold_intents: [billing, khata]
        expected_tools: [add_sale, add_udhaar]
        expected_ledger_delta:
          - {type: sale, amount_paise: 10000}
          - {type: udhaar, amount_paise: 5000, customer: Meena}

  - id: a_greeting
    lang: hi
    tags: [none, audio]
    turns:
      - utterance: "नमस्ते कैसे हो"
        audio: synthetic/a_greeting.wav
        gold_transcript: "नमस्ते कैसे हो"
        gold_intents_any: [none]
        expected_ledger_delta: []
